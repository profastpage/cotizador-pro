<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="20" y="20" width="472" height="472" rx="120" ry="120" fill="url(#bgGrad)"/>
  
  <!-- Document icon -->
  <g transform="translate(128, 100)" filter="url(#shadow)">
    <!-- Document body -->
    <rect x="0" y="0" width="256" height="312" rx="16" ry="16" fill="url(#docGrad)"/>
    
    <!-- Folded corner -->
    <path d="M184 0 L256 72 L256 0 Z" fill="#cbd5e1"/>
    <path d="M184 0 L184 72 L256 72 Z" fill="#94a3b8" opacity="0.3"/>
    
    <!-- Document lines (representing quote items) -->
    <rect x="32" y="64" width="140" height="12" rx="6" fill="#1e40af" opacity="0.8"/>
    <rect x="32" y="96" width="192" height="8" rx="4" fill="#94a3b8"/>
    <rect x="32" y="116" width="170" height="8" rx="4" fill="#94a3b8"/>
    
    <!-- Item rows -->
    <rect x="32" y="152" width="192" height="10" rx="5" fill="#e2e8f0"/>
    <rect x="32" y="178" width="192" height="10" rx="5" fill="#e2e8f0"/>
    <rect x="32" y="204" width="150" height="10" rx="5" fill="#e2e8f0"/>
    
    <!-- Total bar -->
    <rect x="32" y="248" width="192" height="16" rx="8" fill="#059669"/>
    <rect x="40" y="252" width="60" height="8" rx="4" fill="#ffffff"/>
  </g>
</svg>
