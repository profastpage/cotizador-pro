<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="50%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    
    <!-- Subtle pattern overlay -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5" opacity="0.05"/>
    </pattern>
    
    <!-- Document icon shadow -->
    <filter id="docShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="200" fill="white" opacity="0.03"/>
  <circle cx="1100" cy="550" r="250" fill="white" opacity="0.03"/>
  <circle cx="600" cy="315" r="350" fill="white" opacity="0.02"/>

  <!-- LEFT SIDE - Icon/Logo area -->
  <g transform="translate(100, 115)" filter="url(#docShadow)">
    <!-- Icon background -->
    <rect x="0" y="0" width="400" height="400" rx="80" ry="80" fill="white" opacity="0.15"/>
    <rect x="10" y="10" width="380" height="380" rx="70" ry="70" fill="white" opacity="0.1"/>
    
    <!-- Document shape -->
    <g transform="translate(80, 60)">
      <!-- Main document body -->
      <rect x="0" y="0" width="240" height="290" rx="16" ry="16" fill="white"/>
      
      <!-- Folded corner -->
      <path d="M168 0 L240 72 L240 0 Z" fill="#e2e8f0"/>
      <path d="M168 0 L168 72 L240 72 Z" fill="#cbd5e1" opacity="0.5"/>
      
      <!-- Document content lines -->
      <!-- Title bar -->
      <rect x="24" y="40" width="120" height="14" rx="7" fill="#1e40af"/>
      
      <!-- Subtitle -->
      <rect x="24" y="70" width="180" height="8" rx="4" fill="#94a3b8"/>
      <rect x="24" y="86" width="150" height="8" rx="4" fill="#94a3b8"/>
      
      <!-- Divider -->
      <line x1="24" y1="110" x2="216" y2="110" stroke="#e2e8f0" stroke-width="2"/>
      
      <!-- Item rows -->
      <rect x="24" y="130" width="180" height="12" rx="6" fill="#f1f5f9"/>
      <rect x="24" y="155" width="180" height="12" rx="6" fill="#f1f5f9"/>
      <rect x="24" y="180" width="140" height="12" rx="6" fill="#f1f5f9"/>
      
      <!-- Total section -->
      <rect x="24" y="220" width="180" height="40" rx="12" fill="#059669"/>
      <rect x="36" y="232" width="70" height="16" rx="8" fill="white" opacity="0.9"/>
      
      <!-- Checkmark on total -->
      <path d="M150 235 L160 245 L180 225" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- RIGHT SIDE - Text content -->
  <g transform="translate(560, 130)">
    <!-- App name -->
    <text x="0" y="0" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-1">CotizaPro</text>
    
    <!-- Tagline -->
    <text x="0" y="70" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="400" fill="white" opacity="0.85">Cotizaciones Profesionales en PDF</text>
    
    <!-- Divider line -->
    <rect x="0" y="100" width="80" height="4" rx="2" fill="white" opacity="0.3"/>
    
    <!-- Feature list -->
    <g transform="translate(0, 140)">
      <!-- Feature 1 -->
      <g transform="translate(0, 0)">
        <circle cx="16" cy="16" r="16" fill="white" opacity="0.2"/>
        <text x="48" y="22" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="500" fill="white" opacity="0.95">Crea cotizaciones en segundos</text>
      </g>
      
      <!-- Feature 2 -->
      <g transform="translate(0, 55)">
        <circle cx="16" cy="16" r="16" fill="white" opacity="0.2"/>
        <text x="48" y="22" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="500" fill="white" opacity="0.95">IGV automático configurable</text>
      </g>
      
      <!-- Feature 3 -->
      <g transform="translate(0, 110)">
        <circle cx="16" cy="16" r="16" fill="white" opacity="0.2"/>
        <text x="48" y="22" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="500" fill="white" opacity="0.95">10 tipos de documentos</text>
      </g>
      
      <!-- Feature 4 -->
      <g transform="translate(0, 165)">
        <circle cx="16" cy="16" r="16" fill="white" opacity="0.2"/>
        <text x="48" y="22" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="500" fill="white" opacity="0.95">Planes desde S/ 0/mes</text>
      </g>
    </g>
    
    <!-- CTA Badge -->
    <g transform="translate(0, 370)">
      <rect x="0" y="0" width="200" height="52" rx="26" fill="white"/>
      <text x="100" y="33" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#1e40af" text-anchor="middle">¡PRUEBA GRATIS!</text>
    </g>
  </g>

  <!-- Bottom URL bar -->
  <g transform="translate(100, 560)">
    <rect x="0" y="0" width="350" height="40" rx="20" fill="white" opacity="0.1"/>
    <text x="20" y="26" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="white" opacity="0.8">cotizador-pro.pages.dev</text>
  </g>
</svg>
