<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CotizaPro - Icon Generator</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      color: #1e40af;
      text-align: center;
    }
    .btn-generate {
      display: block;
      width: 200px;
      margin: 20px auto;
      padding: 12px 24px;
      background: #1e40af;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .btn-generate:hover {
      background: #1e3a8a;
    }
    #preview {
      margin-top: 30px;
      text-align: center;
    }
    #preview canvas {
      margin: 10px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .instructions {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }
    .instructions h3 {
      color: #1e40af;
      margin-bottom: 10px;
    }
    .instructions ol {
      padding-left: 20px;
    }
    .instructions li {
      margin: 8px 0;
    }
  </style>
</head>
<body>
  <h1>📊 CotizaPro - Icon Generator</h1>
  
  <button class="btn-generate" onclick="generateAndDownload()">Generate & Download Icons</button>
  
  <div id="preview"></div>
  
  <div class="instructions">
    <h3>Instructions:</h3>
    <ol>
      <li>Click the "Generate & Download Icons" button</li>
      <li>A ZIP file will download with all icon sizes</li>
      <li>Extract the ZIP to the <code>icons/</code> folder</li>
      <li>Refresh the main app - icons are ready!</li>
    </ol>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
    
    function drawIcon(ctx, size) {
      // Background
      const radius = size * 0.125;
      ctx.fillStyle = '#1e40af';
      roundRect(ctx, 0, 0, size, size, radius);
      ctx.fill();
      
      // Document
      const docMargin = size * 0.1875;
      const docWidth = size * 0.625;
      const docHeight = size * 0.5;
      const docRadius = size * 0.03125;
      ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
      roundRect(ctx, docMargin, docMargin, docWidth, docHeight, docRadius);
      ctx.fill();
      
      // Header line
      ctx.fillStyle = '#1e40af';
      roundRect(ctx, docMargin + size * 0.0625, docMargin + size * 0.0625, size * 0.234, size * 0.023, size * 0.012);
      ctx.fill();
      
      // Subtitle
      ctx.fillStyle = '#94a3b8';
      roundRect(ctx, docMargin + size * 0.0625, docMargin + size * 0.109, size * 0.156, size * 0.016, size * 0.008);
      ctx.fill();
      
      // Content lines
      ctx.fillStyle = '#e2e8f0';
      for (let i = 0; i < 3; i++) {
        roundRect(ctx, docMargin + size * 0.0625, docMargin + size * 0.172 + (i * size * 0.047), size * (0.4 - i * 0.04), size * 0.008, size * 0.004);
        ctx.fill();
      }
      
      // Total badge
      ctx.fillStyle = '#059669';
      const badgeWidth = size * 0.15;
      const badgeHeight = size * 0.047;
      const badgeX = docMargin + size * 0.39;
      const badgeY = docMargin + size * 0.36;
      roundRect(ctx, badgeX, badgeY, badgeWidth, badgeHeight, badgeHeight * 0.5);
      ctx.fill();
      
      // S/ text
      ctx.fillStyle = 'white';
      ctx.font = `bold ${size * 0.027}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('S/', badgeX + badgeWidth / 2, badgeY + badgeHeight / 2);
    }
    
    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }
    
    async function generateAndDownload() {
      const zip = new JSZip();
      const preview = document.getElementById('preview');
      preview.innerHTML = '<h3>Preview:</h3>';
      
      for (const size of sizes) {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        
        drawIcon(ctx, size);
        
        // Add to preview
        const previewCanvas = canvas.cloneNode();
        previewCanvas.width = 128;
        previewCanvas.height = 128;
        previewCanvas.getContext('2d').drawImage(canvas, 0, 0, 128, 128);
        preview.appendChild(previewCanvas);
        
        // Add to ZIP
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        zip.file(`icon-${size}x${size}.png`, blob);
      }
      
      const content = await zip.generateAsync({type: 'blob'});
      const url = URL.createObjectURL(content);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'cotizapro-icons.zip';
      a.click();
      URL.revokeObjectURL(url);
      
      alert('Icons downloaded! Extract the ZIP to the icons/ folder.');
    }
  </script>
</body>
</html>
