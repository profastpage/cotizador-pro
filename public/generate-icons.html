<!DOCTYPE html>
<html>
<head>
  <title>Generate Icons</title>
  <script>
    // Generate PNG icons from SVG using canvas
    const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
    
    const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
      <rect width="512" height="512" rx="64" fill="#1e40af"/>
      <rect x="96" y="128" width="320" height="256" rx="16" fill="white" opacity="0.95"/>
      <rect x="128" y="160" width="120" height="12" rx="6" fill="#1e40af"/>
      <rect x="128" y="184" width="80" height="8" rx="4" fill="#94a3b8"/>
      <rect x="128" y="216" width="256" height="4" rx="2" fill="#e2e8f0"/>
      <rect x="128" y="240" width="200" height="4" rx="2" fill="#e2e8f0"/>
      <rect x="128" y="264" width="220" height="4" rx="2" fill="#e2e8f0"/>
      <rect x="128" y="304" width="100" height="8" rx="4" fill="#64748b"/>
      <rect x="128" y="320" width="60" height="8" rx="4" fill="#94a3b8"/>
      <rect x="320" y="304" width="64" height="24" rx="12" fill="#059669"/>
      <text x="352" y="321" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">S/</text>
    </svg>`;

    function generateIcons() {
      const blob = new Blob([svgContent], {type: 'image/svg+xml'});
      const url = URL.createObjectURL(blob);
      const img = new Image();
      
      img.onload = function() {
        sizes.forEach(size => {
          const canvas = document.createElement('canvas');
          canvas.width = size;
          canvas.height = size;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, size, size);
          
          canvas.toBlob(function(pngBlob) {
            const url = URL.createObjectURL(pngBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `icon-${size}x${size}.png`;
            a.click();
            URL.revokeObjectURL(url);
          });
        });
        URL.revokeObjectURL(url);
      };
      
      img.src = url;
    }
  </script>
</head>
<body>
  <h1>Click the button to generate icons</h1>
  <button onclick="generateIcons()">Generate Icons</button>
</body>
</html>
